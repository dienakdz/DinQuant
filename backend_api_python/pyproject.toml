[tool.ruff]
line-length = 120
target-version = "py312"
extend-exclude = [
  ".git",
  ".venv",
  "__pycache__",
  "migrations",
]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F", "I"]

[tool.ruff.format]
indent-style = "space"
line-ending = "lf"
quote-style = "double"

[tool.vulture]
paths = ["app", "scripts", "run.py", "gunicorn_config.py"]
exclude = ["migrations/", "__pycache__/"]
ignore_decorators = [
  "@*.route",
  "@*.get",
  "@*.post",
  "@*.put",
  "@*.patch",
  "@*.delete",
  "@*.errorhandler",
]
ignore_names = ["test_*"]
min_confidence = 80
